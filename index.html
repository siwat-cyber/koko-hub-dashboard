<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOKO HUB Intelligence - 2026 Ultimate Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');
        :root { --bg-main: #0f172a; --bg-card: #1e293b; --accent: #6366f1; }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg-main); color: #f8fafc; margin: 0; }
        .sidebar-scroll { height: calc(100vh - 120px); overflow-y: auto; }
        .premium-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s ease; }
        .premium-card:hover { border-color: rgba(99, 102, 241, 0.4); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col md:flex-row">

    <aside class="w-full md:w-80 bg-[#070b14] flex-shrink-0 flex flex-col h-screen sticky top-0 z-20 border-r border-white/5">
        <div class="p-6 border-b border-white/5 flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-xl"><i data-lucide="layout-dashboard" class="w-6 h-6 text-white"></i></div>
            <h1 class="text-xl font-bold tracking-tight text-white uppercase">KOKO HUB <span class="text-indigo-500 text-sm">v.2026</span></h1>
        </div>

        <div class="p-6 sidebar-scroll space-y-6">
            <div>
                <label for="csvFileInput" class="flex flex-col items-center justify-center w-full p-6 border-2 border-dashed border-slate-800 rounded-2xl cursor-pointer hover:border-indigo-500 hover:bg-indigo-500/5 transition-all group">
                    <i data-lucide="upload-cloud" class="w-8 h-8 mb-2 text-slate-500 group-hover:text-indigo-400"></i>
                    <span class="text-[10px] font-bold uppercase tracking-widest text-slate-400 group-hover:text-white text-center">อัปโหลดไฟล์ PO (CSV)</span>
                    <input type="file" id="csvFileInput" accept=".csv" class="hidden" onchange="handleFileUpload(event)">
                </label>
            </div>

            <div class="space-y-4 pt-4 border-t border-white/5">
                <div>
                    <label class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest mb-2 block">เลือกสาขา/บริษัท</label>
                    <select id="filterBranch" onchange="applyFilters()" class="w-full p-3 rounded-xl text-xs bg-[#0f172a] border border-slate-800 text-white outline-none appearance-none">
                        <option value="all">-- ทุกสาขา --</option>
                    </select>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest mb-2 block">หมวดหมู่สินค้า</label>
                    <select id="filterCategory" onchange="applyFilters()" class="w-full p-3 rounded-xl text-xs bg-[#0f172a] border border-slate-800 text-white outline-none appearance-none">
                        <option value="all">-- ทุกหมวดหมู่ --</option>
                        <option value="Frozen Food">Frozen Food</option>
                        <option value="Dry Food">Dry Food</option>
                        <option value="Cleaning Supply">Cleaning Supply</option>
                        <option value="Dry & Liquid Amenity">Dry & Liquid Amenity</option>
                        <option value="Kitchen Supply">Kitchen Supply</option>
                        <option value="Stationary">Stationary</option>
                        <option value="Printing & Signage">Printing & Signage</option>
                        <option value="3rd Party">3rd Party (นอกรายการ)</option>
                    </select>
                </div>
                
                <button onclick="window.location.reload()" class="w-full py-3 text-[10px] font-bold text-slate-400 border border-slate-800 rounded-xl hover:bg-slate-800 uppercase tracking-widest flex items-center justify-center gap-2">
                    <i data-lucide="rotate-ccw" class="w-3 h-3"></i> รีเซ็ตข้อมูล
                </button>
            </div>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto bg-[#0f172a]">
        <header class="bg-[#0f172a]/80 backdrop-blur-md border-b border-white/5 px-8 py-6 flex justify-between items-center sticky top-0 z-10">
            <div>
                <h2 class="text-xl font-bold text-white tracking-tight">Purchase Analytics 2026</h2>
                <p id="summaryText" class="text-[11px] text-indigo-400 font-medium uppercase tracking-widest mt-1">Status: Waiting for Data...</p>
            </div>
            <div id="statusBadge" class="hidden px-4 py-2 bg-emerald-500/10 text-emerald-400 text-[10px] font-bold rounded-full border border-emerald-500/20 uppercase">
                Triple-Layer Matching Active
            </div>
        </header>

        <div class="p-8 space-y-8 max-w-[1400px] mx-auto">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                <div class="premium-card p-6 rounded-3xl">
                    <p class="text-[10px] font-bold text-slate-500 uppercase mb-1">Total Amount (THB)</p>
                    <h3 id="statTotalAmount" class="text-3xl font-black text-white">0.00</h3>
                </div>
                <div class="premium-card p-6 rounded-3xl">
                    <p class="text-[10px] font-bold text-slate-500 uppercase mb-1">Total Items</p>
                    <h3 id="statTotalItems" class="text-3xl font-black text-white">0</h3>
                </div>
                <div class="premium-card p-6 rounded-3xl">
                    <p class="text-[10px] font-bold text-indigo-400 uppercase mb-1">3rd Party Items</p>
                    <h3 id="stat3rdParty" class="text-3xl font-black text-white">0</h3>
                </div>
                <div class="premium-card p-6 rounded-3xl">
                    <p class="text-[10px] font-bold text-slate-500 uppercase mb-1">Total Suppliers</p>
                    <h3 id="statSuppliers" class="text-3xl font-black text-white">0</h3>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="premium-card p-8 rounded-[2.5rem] h-[500px] flex flex-col">
                    <h4 class="text-xs font-bold text-white uppercase tracking-widest mb-6 flex items-center gap-2">
                        <i data-lucide="pie-chart" class="w-4 h-4 text-indigo-500"></i> Category Breakdown
                    </h4>
                    <div class="flex-1 min-h-0"><canvas id="categoryPieChart"></canvas></div>
                </div>
                <div class="premium-card p-8 rounded-[2.5rem] h-[500px] flex flex-col">
                    <h4 class="text-xs font-bold text-white uppercase tracking-widest mb-6 flex items-center gap-2">
                        <i data-lucide="bar-chart-3" class="w-4 h-4 text-emerald-500"></i> Top 10 SKU Ranking
                    </h4>
                    <div class="flex-1 min-h-0"><canvas id="top10BarChart"></canvas></div>
                </div>
            </div>

            <div class="premium-card p-8 rounded-[2.5rem] h-[450px] flex flex-col">
                <h4 class="text-xs font-bold text-white uppercase tracking-widest mb-6 flex items-center gap-2">
                    <i data-lucide="building-2" class="w-4 h-4 text-amber-500"></i> Spending by Branch / Company
                </h4>
                <div class="flex-1 min-h-0"><canvas id="branchBarChart"></canvas></div>
            </div>
        </div>
    </main>

    <script>
        let allData = [];
        let activeData = [];
        let charts = { catPie: null, topBar: null, branchBar: null };

        // --- LAYER 1: MASTER DATA (ดึงรายการจากไฟล์ catagory2026) ---
        const masterData2026 = {
            "Meat Ball : With Tomato Sauce 1 kg pack": "Frozen Food",
            "Oyako Don : (110g) {K-20030406 } 20 each pack": "Frozen Food",
            "Curry Massaman : Chicken Frozen 1 kg": "Frozen Food",
            "Spaghetti Noodle : Boil 54 each pack": "Frozen Food",
            "Shower Cap : Cornstarch (Cotton Paper Sachet : Brown)": "Dry & Liquid Amenity",
            "Toilet Tissue : White 2 Ply 14 m roll": "Cleaning Supply",
            "Hand Towel M-Fold : 1 Ply Airflex (24x23cm) 250 sheet": "Cleaning Supply",
            "Dental Kits : Wheatstraw Toothbrush + (3g) Kraft Toothpaste (17cm) (Cotton Paper Sachet : Brown)": "Dry & Liquid Amenity",
            "Tomato Ketchup 300 ml bottle": "Dry Food",
            "Oil Palm 18 lt": "Dry Food",
            "Copy Paper : A4 80gsm White": "Stationary",
            "Sanitary Bag : Without Logo Without Packaging Generic Bag White": "Dry & Liquid Amenity",
            "Slippers : Disposable (11in) Sole White (3mm)": "Dry & Liquid Amenity"
        };

        // --- LAYER 2: SMART KEYWORD LOGIC ---
        const categoryRules = [
            { name: "Dry & Liquid Amenity", keywords: ["shower cap", "dental kit", "toothbrush", "amenity", "shampoo", "slippers", "cotton pads", "handwash"] },
            { name: "Cleaning Supply", keywords: ["toilet paper", "facial tissue", "hand towel", "m-fold", "tissue", "garbage bag", "cleaner", "dishwashing", "bleach", "haiter"] },
            { name: "Frozen Food", keywords: ["frozen", "meat ball", "saba", "salmon", "gyoza", "yakitori", "noodle set", "spaghetti", "chicken green curry"] },
            { name: "Dry Food", keywords: ["mama", "instant noodle", "shoyu", "oil", "rice", "salt", "sugar", "sauce", "ketchup", "mayonnaise"] },
            { name: "Kitchen Supply", keywords: ["plate", "bowl", "dish", "spoon", "fork", "glass", "wrap", "foil"] },
            { name: "Stationary", keywords: ["paper a4", "pen", "pencil", "folder", "tape", "glue", "battery"] },
            { name: "Printing & Signage", keywords: ["sticker", "signage", "card", "keycard", "name tag"] }
        ];

        // --- TRIPLE LAYER CLASSIFICATION ---
        function getCategoryUltimate(description) {
            if (!description) return "3rd Party";
            const fullDesc = description.trim();
            const lowerDesc = fullDesc.toLowerCase();

            // Layer 1: Exact Match (แม่นยำ 100%)
            if (masterData2026[fullDesc]) return masterData2026[fullDesc];

            // Layer 2: Keyword Priority Match
            for (const rule of categoryRules) {
                if (rule.keywords.some(k => lowerDesc.includes(k.toLowerCase()))) {
                    return rule.name;
                }
            }

            // Layer 3: Fallback (สินค้าใหม่/นอกรายการ)
            return "3rd Party";
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const branches = new Set();
                    allData = results.data.map(row => {
                        const desc = row.Description || row.description || "";
                        const branch = row.Company || row.company || "Unknown";
                        const total = parseFloat(String(row.Total || 0).replace(/,/g, '')) || 0;
                        branches.add(branch);
                        return { 
                            ...row, 
                            _category: getCategoryUltimate(desc), 
                            _branch: branch, 
                            _total: total 
                        };
                    });
                    
                    updateBranchDropdown(Array.from(branches));
                    document.getElementById('statusBadge').classList.remove('hidden');
                    document.getElementById('summaryText').innerText = `Data Loaded: ${allData.length} records`;
                    applyFilters();
                }
            });
        }

        function updateBranchDropdown(branches) {
            const select = document.getElementById('filterBranch');
            select.innerHTML = '<option value="all">-- ทุกสาขา --</option>';
            branches.sort().forEach(b => {
                const opt = document.createElement('option');
                opt.value = b; opt.textContent = b;
                select.appendChild(opt);
            });
        }

        function applyFilters() {
            const cat = document.getElementById('filterCategory').value;
            const branch = document.getElementById('filterBranch').value;

            activeData = allData.filter(d => {
                const matchCat = (cat === 'all' || d._category === cat);
                const matchBranch = (branch === 'all' || d._branch === branch);
                return matchCat && matchBranch;
            });
            updateUI();
        }

        function updateUI() {
            let totalAmount = 0;
            let thirdPartyCount = 0;
            const catStats = {};
            const skuStats = {};
            const branchStats = {};
            const suppliers = new Set();

            activeData.forEach(d => {
                totalAmount += d._total;
                if (d._category === "3rd Party") thirdPartyCount++;
                
                catStats[d._category] = (catStats[d._category] || 0) + d._total;
                
                const sku = d.Description || d.description || "Unknown";
                skuStats[sku] = (skuStats[sku] || 0) + d._total;
                
                branchStats[d._branch] = (branchStats[d._branch] || 0) + d._total;
                suppliers.add(d._branch);
            });

            // Update Widgets
            document.getElementById('statTotalAmount').innerText = totalAmount.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('statTotalItems').innerText = activeData.length.toLocaleString();
            document.getElementById('stat3rdParty').innerText = thirdPartyCount.toLocaleString();
            document.getElementById('statSuppliers').innerText = suppliers.size;

            renderPie(catStats);
            renderTop10(skuStats);
            renderBranch(branchStats);
            lucide.createIcons();
        }

        function renderPie(stats) {
            const ctx = document.getElementById('categoryPieChart');
            if(charts.catPie) charts.catPie.destroy();
            const sortedKeys = Object.keys(stats).sort((a,b) => stats[b] - stats[a]);
            charts.catPie = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: sortedKeys,
                    datasets: [{
                        data: sortedKeys.map(k => stats[k]),
                        backgroundColor: ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4', '#475569'],
                        borderWidth: 0
                    }]
                },
                options: { 
                    maintainAspectRatio: false, 
                    plugins: { 
                        legend: { position: 'right', labels: { color: '#94a3b8', font: { family: 'Sarabun', size: 11 } } } 
                    },
                    cutout: '70%'
                }
            });
        }

        function renderTop10(stats) {
            const ctx = document.getElementById('top10BarChart');
            if(charts.topBar) charts.topBar.destroy();
            const top10 = Object.entries(stats).sort((a,b) => b[1] - a[1]).slice(0, 10);
            charts.topBar = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: top10.map(d => d[0]),
                    datasets: [{ label: 'Spending', data: top10.map(d => d[1]), backgroundColor: '#10b981', borderRadius: 8 }]
                },
                options: {
                    indexAxis: 'y',
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } },
                        y: { ticks: { color: '#fff', font: { size: 10 } } }
                    }
                }
            });
        }

        function renderBranch(stats) {
            const ctx = document.getElementById('branchBarChart');
            if(charts.branchBar) charts.branchBar.destroy();
            const sorted = Object.entries(stats).sort((a,b) => b[1] - a[1]);
            charts.branchBar = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sorted.map(d => d[0]),
                    datasets: [{ label: 'Total Spending', data: sorted.map(d => d[1]), backgroundColor: '#6366f1', borderRadius: 10 }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { ticks: { color: '#64748b' } },
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } }
                    }
                }
            });
        }

        window.onload = () => lucide.createIcons();
    </script>
</body>
</html>
