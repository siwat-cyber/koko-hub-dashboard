    <script>
        let allData = [];
        let activeData = [];
        let currentMetric = 'finance'; 
        let charts = { catPie: null, compPie: null, topBar: null, trendLine: null, branchBar: null };
        let deliveryCharts = null;

        // 1. กฎการกรองด้วย Keyword (Priority Logic)
const categoryRules = [
 { 
        name: "Frozen Food", 
        keywords: ["frozen", "meat ball", "saba", "salmon", "gyoza", "yakitori", "noodle set", "spaghetti", "Scram", "eeg","Curry","Chicken","Ssausage","folies","Sweet Chikuzen","Potato","cinnamon","banana",
        "cheese","banana Muffin","tamago","nameko","Donut","fried","bamboo","thaifuku","jellyfish","takana","tonkatsu","bread pizza","oyako don","gyudon","Meat ball","Ratatouille","Donut : sugared",
                  "allowrie butter","Delifrance","Aomori Trout","Chuka Wakame","bean Paste","Welna - Pro Taste Carbonara Sauce","Spinach","TNS Pickled Vegetable / Fukujinzuke"] 
    },

     { 
        name: "Cleaning Supply", 
        keywords: ["tissue", "toilet paper", "hand towel", "m-fold", "garbage bag", "cleaner", "haiter", "detergent","sunlight","Bag garbage","Toilet Tissue : White 2 Ply 14 m roll",
                 "Toilet Tissue : 2 Ply Jumbo Rolls 300 m roll","correct" ] 
    },
    
    { 
        name: "Dry Food", 
        keywords: ["instant noodle", "shoyu", "oil", "rice", "salt", "sugar", "roza", "ketchup","Kewpie","Boncafe" ,"Ito En","juice","Kelloggs","Nutella","Honey","milo","ayam","miso soup",
        "Mccormick","jam","hersheys","UFC","Dilmah","Twinings","JIF","boncafe cleaner","Knorr Sauce : Pizza","Eel"] 
    },
    
    { 
       name: "Guest Supplies set in Room", 
        keywords: ["Mug : Porcelain White With Hotel Logo Blue Two Point Model A (300ml)","Umbrella","tray","ribbon","bow","Bottle : Plastic Blue With Head Pump","kokotel bottle"] 
    }, 
    { 
       name: "Take Away", 
        keywords: ["cup", "lid", "sauce cup", "chopsticks", "food box", "bowl", "take away","glass : pet"] 
    }, 
    { 
       name: "Printing & Signage", 
        keywords: ["keycard","Door hanger", "sign","lugg","card","name tag","Kokotel Envelop : 100g White Pond Paper Print 1 Colour 1 Side {No 9}",] 
    }, 
    { 
       name: "Amenity special & Snack Harvest", 
        keywords: ["pipo","yupi", "biscuit","candy"] 
    },
    { 
       name: "Boutique shop/Merchandise", 
        keywords: ["koko pants","Kokotel cap","T-Shirt : Cotton 100% ", "bag", "souvenir","pillow","Doll","Coin Case ","Polo Shirt : White Jump Sleeve 1 Logo","Roll up",
                  "Sleeve 1 Logo ","Spinner"] 
    },
    { 
        name: "Uniform",
        keywords: ["polo", "shirt", "t-shirt", "jacket", "apron", "trousers", "uniform","Dress","Koko star","2 Logo","home maker","koko star"] 
    },
    { 
        name: "Dry & Liquid Amenity", 
        keywords: ["shower cap", "dental kit", "toothbrush", "shampoo", "soap bar", "amenity", "slipper","Ozone","cotton buds","cotton pads"] 
    },
   
     { 
       name: "Kitchen Supply", 
        keywords: ["pizza box", "wrapping film", "napkin", "gloves", "plate", "fork", "spoon", 
        "bingsu", "straw", "dish", "bowl", "glass", "tray", "plastic bag", "porcelain", 
        "ceramic", "ladle", "toothpick","gloves","porcelain","white ware","plastic","daikoku","Baking Paper"] 
    }, 
    { 
       name: "3rd Party", 
        keywords: ["farmhouse", "milk", "carbonated beverages", "biscuits", 
            "breakfast cereals and health bars", "yoghurt", "wiwi", 
            "mama", "fruit", "vegetables", "ice cream sorbet and frozen yoghurt", "Nescafe -red","Sport and Energy Drinks,","beer","Orange","root","signha drinking water",
                  "Ete ice cream","Waiwai","Knorr Cup","Diversey" ,"three Ladies","Watermelon","Coca Cola","Tomatoes","Sharp","Heineken","Nescafe coffee","Pepsi","Chang"] 
    }, 
    { 
        name: "Stationary", 
        keywords: ["paper a4", "pen", "pencil", "stapler", "tape", "folder","Orca","panasonic","Lyreco"] 
    }
];

// 2. ฟังก์ชันดึงหมวดหมู่ (ใช้ระบบ Priority Keywords)
function getCategory(description) {
    if (!description) return "Others";
    
    const lowerDesc = description.toLowerCase();

    // วนเช็คตามลำดับความสำคัญใน categoryRules
    for (const rule of categoryRules) {
        if (rule.keywords.some(k => lowerDesc.includes(k.toLowerCase()))) {
            return rule.name;
        }
    }

    return "Others";
}

        function parseDate(str) {
            if (!str) return null;
            const cleanStr = str.trim();
            const months = ["jan", "feb", "mar", "apr", "may", "jun", "jul", "aug", "sep", "oct", "nov", "dec", "ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
            const parts = cleanStr.split(/[-/ ]/);
            if (parts.length >= 3) {
                let d = parseInt(parts[0]);
                let m = isNaN(parts[1]) ? months.findIndex(n => parts[1].toLowerCase().includes(n.toLowerCase())) : parseInt(parts[1]) - 1;
                if (m > 11) m = m - 12;
                let y = parseInt(parts[2]);
                if (y < 100) y += 2000;
                if (y > 2500) y -= 543;
                const date = new Date(y, m, d);
                return isNaN(date.getTime()) ? null : date;
            }
            return null;
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const branches = new Set();
                    let minDate = null, maxDate = null;
                    allData = results.data.map(row => {
                        const dateStr = row['Invoice Date'] || row['Exp/ Date'] || row['วันที่'] || '';
                        const dateObj = parseDate(dateStr);
                        const desc = row.Description || row.description || row.product || '';
                        const branch = row.Company || row.company || row['ชื่อซัพพลายเออร์'] || 'Unknown';
                        const total = parseFloat(String(row.Total || row.total || '0').replace(/,/g, '')) || 0;
                        const qty = parseFloat(String(row.Qty || row.qty || '0').replace(/,/g, '')) || 0;
                        branches.add(branch);
                        if (dateObj) {
                            if (!minDate || dateObj < minDate) minDate = dateObj;
                            if (!maxDate || dateObj > maxDate) maxDate = dateObj;
                        }
                        return { ...row, _dateObj: dateObj, _category: getCategory(desc), _branch: branch, _total: total, _qty: qty };
                    });
                    if (minDate) document.getElementById('startDate').value = minDate.toISOString().split('T')[0];
                    if (maxDate) document.getElementById('endDate').value = maxDate.toISOString().split('T')[0];
                    updateBranchList(Array.from(branches));
                    document.getElementById('statusBadge').classList.remove('hidden');
                    applyFilters();
                }
            });
        }

        function updateBranchList(branches) {
            const select = document.getElementById('filterBranch');
            select.innerHTML = '<option value="all">-- ทุกสาขา --</option>';
            branches.sort().forEach(b => {
                const opt = document.createElement('option');
                opt.value = b; opt.textContent = b;
                select.appendChild(opt);
            });
        }

        function setMetric(metric) {
            currentMetric = metric;
            document.getElementById('btnFinance').classList.toggle('active', metric === 'finance');
            document.getElementById('btnQuantity').classList.toggle('active', metric === 'quantity');
            document.getElementById('labelMainMetric').innerText = metric === 'finance' ? 'Total Amount (THB)' : 'Total Quantity (Units)';
            updateUI();
        }

        function applyFilters() {
            const searchTerms = document.getElementById('searchTerm').value.toLowerCase().split(',').map(t => t.trim()).filter(t => t !== '');
            const category = document.getElementById('filterCategory').value;
            const branch = document.getElementById('filterBranch').value;
            const startVal = document.getElementById('startDate').value;
            const endVal = document.getElementById('endDate').value;
            const startDate = startVal ? new Date(startVal) : null;
            const endDate = endVal ? new Date(endVal) : null;
            if(endDate) endDate.setHours(23, 59, 59);

            activeData = allData.filter(row => {
                const descText = (row.Description || row.description || row.product || '').toLowerCase();
                const matchSearch = searchTerms.length === 0 || searchTerms.some(term => descText.includes(term));
                const matchCat = category === 'all' || row._category === category;
                const matchBranch = branch === 'all' || row._branch === branch;
                let matchDate = true;
                if (row._dateObj) {
                    if (startDate && row._dateObj < startDate) matchDate = false;
                    if (endDate && row._dateObj > endDate) matchDate = false;
                } else if (startDate || endDate) matchDate = false;
                return matchSearch && matchCat && matchBranch && matchDate;
            });
            updateUI();
        }

        function resetFilters() {
            document.getElementById('searchTerm').value = '';
            document.getElementById('filterCategory').value = 'all';
            document.getElementById('filterBranch').value = 'all';
            applyFilters();
        }

        function updateUI() {
            let metricSum = 0;
            const catStats = {};
            const compStats = {};
            const productStats = {};
            const monthlyStats = {};
            const branchUsageStats = {}; // สำหรับกราฟแยกสาขา

            activeData.forEach(row => {
                const valMetric = currentMetric === 'finance' ? row._total : row._qty;
                const valQty = row._qty;
                metricSum += valMetric;
                
                catStats[row._category] = (catStats[row._category] || 0) + valMetric;
                compStats[row._branch] = (compStats[row._branch] || 0) + valMetric;
                
                // เก็บสถิติแยกสาขาสำหรับกราฟใหม่
                branchUsageStats[row._branch] = (branchUsageStats[row._branch] || 0) + valMetric;

                const p = row.Description || row.description || row.product || 'Unknown';
                productStats[p] = (productStats[p] || 0) + valMetric;
                
                if (row._dateObj) {
                    const monthKey = row._dateObj.getFullYear() + '-' + String(row._dateObj.getMonth() + 1).padStart(2, '0');
                    monthlyStats[monthKey] = (monthlyStats[monthKey] || 0) + valQty;
                }
            });

            document.getElementById('statTotalItems').innerText = activeData.length.toLocaleString();
            document.getElementById('statMainMetricValue').innerText = metricSum.toLocaleString(undefined, {minimumFractionDigits: currentMetric === 'finance' ? 2 : 0});
            document.getElementById('statUniqueProducts').innerText = Object.keys(productStats).length;
            document.getElementById('statTotalSuppliers').innerText = Object.keys(compStats).length;

            renderPie('categoryPieChart', 'catPie', catStats, ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4', '#475569']);
            renderPie('companyPieChart', 'compPie', compStats, ['#0ea5e9', '#f43f5e', '#10b981', '#fbbf24', '#a855f7', '#64748b', '#ec4899']);
            renderTop10Bar(productStats);
            renderTrendChart(monthlyStats);
            
            // วาดกราฟ Usage by Branch
            renderBranchUsageChart(branchUsageStats);
            
            lucide.createIcons();
        }

        function renderBranchUsageChart(stats) {
            const ctx = document.getElementById('branchUsageChart');
            if (charts.branchBar) charts.branchBar.destroy();
            
            const sortedData = Object.entries(stats).sort((a, b) => b[1] - a[1]);
            
            charts.branchBar = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sortedData.map(d => d[0]),
                    datasets: [{
                        label: currentMetric === 'finance' ? 'Total (THB)' : 'Total (Qty)',
                        data: sortedData.map(d => d[1]),
                        backgroundColor: '#6366f1',
                        borderRadius: 8
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { ticks: { color: '#64748b', font: { size: 10, family: 'Sarabun' } } },
                        y: { beginAtZero: true, ticks: { color: '#64748b' } }
                    }
                }
            });
        }

        function renderPie(canvasId, chartKey, stats, colors) {
            const ctx = document.getElementById(canvasId);
            if(charts[chartKey]) charts[chartKey].destroy();
            const sortedData = Object.entries(stats).sort((a,b) => b[1] - a[1]).slice(0, 10);
            charts[chartKey] = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: sortedData.map(d => d[0]),
                    datasets: [{
                        data: sortedData.map(d => d[1]),
                        backgroundColor: colors,
                        borderColor: '#1e293b',
                        borderWidth: 2
                    }]
                },
                options: { 
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { position: 'right', labels: { color: '#94a3b8', font: { size: 10, family: 'Sarabun' }, usePointStyle: true } } 
                    },
                    cutout: '70%'
                }
            });
        }

        function renderTop10Bar(freq) {
            const ctx = document.getElementById('top10BarChart');
            if(charts.topBar) charts.topBar.destroy();
            const top10 = Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, 10);
            charts.topBar = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: top10.map(d => d[0]),
                    datasets: [{
                        label: currentMetric === 'finance' ? 'Total (THB)' : 'Total (Qty)',
                        data: top10.map(d => d[1]),
                        backgroundColor: currentMetric === 'finance' ? '#6366f1' : '#10b981',
                        borderRadius: 8,
                        barThickness: 30
                    }]
                },
                options: {
                    indexAxis: 'y',
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } },
                        y: { grid: { display: false }, ticks: { color: '#f8fafc', font: { size: 11 } } }
                    }
                }
            });
        }

        function renderTrendChart(stats) {
            const ctx = document.getElementById('monthlyTrendChart');
            if(charts.trendLine) charts.trendLine.destroy();
            const sortedMonths = Object.keys(stats).sort();
            charts.trendLine = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sortedMonths,
                    datasets: [{
                        label: 'Sales Volume (Qty)',
                        data: sortedMonths.map(m => stats[m]),
                        backgroundColor: 'rgba(99, 102, 241, 0.8)',
                        hoverBackgroundColor: '#6366f1',
                        borderRadius: 6,
                        barThickness: 'flex',
                        maxBarThickness: 50
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: true, labels: { color: '#94a3b8', font: { family: 'Sarabun', size: 12 } } }
                    },
                    scales: {
                        x: { grid: { display: false }, ticks: { color: '#64748b', font: { family: 'Sarabun' } } },
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b', font: { family: 'Sarabun' } }, beginAtZero: true }
                    }
                }
            });
        }

        function handleDeliveryUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const delStats = {};
                    results.data.forEach(row => {
                        const dateStr = row['วันที่'] || row['Date'] || '';
                        const d = parseDate(dateStr);
                        if (d && row['รวมทั้งหมด'] && !dateStr.includes('รวม')) {
                            const monthKey = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
                            const totalQty = parseFloat(String(row['รวมทั้งหมด']).replace(/,/g, '')) || 0;
                            delStats[monthKey] = (delStats[monthKey] || 0) + totalQty;
                        }
                    });
                    renderDeliveryChart(delStats);
                }
            });
        }

        function renderDeliveryChart(stats) {
            const ctx = document.getElementById('deliveryBarChart');
            if(deliveryCharts) deliveryCharts.destroy();
            const sortedMonths = Object.keys(stats).sort();
            deliveryCharts = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sortedMonths,
                    datasets: [{
                        label: 'Total Delivery Volume (Boxes)',
                        data: sortedMonths.map(m => stats[m]),
                        backgroundColor: '#10b981',
                        borderRadius: 8
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: true, labels: { color: '#94a3b8', font: { family: 'Sarabun' } } }
                    },
                    scales: {
                        x: { grid: { display: false }, ticks: { color: '#64748b', font: { family: 'Sarabun' } } },
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b', font: { family: 'Sarabun' } }, beginAtZero: true }
                    }
                }
            });
        }

        window.onload = () => lucide.createIcons();
    </script>
</body>
</html>
