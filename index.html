            </div>

            <div class="pt-2 border-t border-white/5">

            <div class="space-y-6 pt-2 border-t border-white/5">

                </div>

// ==========================================
function getCategory(description) {
    if (!description) return "3rd Party";
    const fullDesc = description.trim();
    const lowerDesc = fullDesc.toLowerCase();

    // ลำดับ 1: เช็ค Master Data (แม่นยำที่สุด)
    if (masterData2026[fullDesc]) {
        return masterData2026[fullDesc];
    }

    // ลำดับ 2: เช็ค Keyword
    for (const rule of categoryRules) {
        if (rule.keywords.some(k => lowerDesc.includes(k.toLowerCase()))) {
            return rule.name;
        }
    }

    // ลำดับ 3: ถ้าไม่เจอเลย
    return "3rd Party";
}
        function parseDate(str) {
            if (!str) return null;
            const cleanStr = str.trim();
            const months = ["jan", "feb", "mar", "apr", "may", "jun", "jul", "aug", "sep", "oct", "nov", "dec", "ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
            const parts = cleanStr.split(/[-/ ]/);
            if (parts.length >= 3) {
                let d = parseInt(parts[0]);
                let m = isNaN(parts[1]) ? months.findIndex(n => parts[1].toLowerCase().includes(n.toLowerCase())) : parseInt(parts[1]) - 1;
                if (m > 11) m = m - 12;
                let y = parseInt(parts[2]);
                if (y < 100) y += 2000;
                if (y > 2500) y -= 543;
                const date = new Date(y, m, d);
                return isNaN(date.getTime()) ? null : date;
            }
            return null;
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const branches = new Set();
                    let minDate = null, maxDate = null;
                    allData = results.data.map(row => {
                        const dateStr = row['Invoice Date'] || row['Exp/ Date'] || row['วันที่'] || '';
                        const dateObj = parseDate(dateStr);
                        const desc = row.Description || row.description || row.product || '';
                        const branch = row.Company || row.company || row['ชื่อซัพพลายเออร์'] || 'Unknown';
                        const total = parseFloat(String(row.Total || row.total || '0').replace(/,/g, '')) || 0;
                        const qty = parseFloat(String(row.Qty || row.qty || '0').replace(/,/g, '')) || 0;
                        branches.add(branch);
                        if (dateObj) {
                            if (!minDate || dateObj < minDate) minDate = dateObj;
                            if (!maxDate || dateObj > maxDate) maxDate = dateObj;
                        }
                        return { ...row, _dateObj: dateObj, _category: getCategory(desc), _branch: branch, _total: total, _qty: qty };
                    });
                    if (minDate) document.getElementById('startDate').value = minDate.toISOString().split('T')[0];
                    if (maxDate) document.getElementById('endDate').value = maxDate.toISOString().split('T')[0];
                    updateBranchList(Array.from(branches));
                    document.getElementById('statusBadge').classList.remove('hidden');
                    applyFilters();
                }
            });
        }

        function updateBranchList(branches) {
            const select = document.getElementById('filterBranch');
            select.innerHTML = '<option value="all">-- ทุกสาขา --</option>';
            branches.sort().forEach(b => {
                const opt = document.createElement('option');
                opt.value = b; opt.textContent = b;
                select.appendChild(opt);
            });
        }

        function setMetric(metric) {
            currentMetric = metric;
            document.getElementById('btnFinance').classList.toggle('active', metric === 'finance');
            document.getElementById('btnQuantity').classList.toggle('active', metric === 'quantity');
            document.getElementById('labelMainMetric').innerText = metric === 'finance' ? 'Total Amount (THB)' : 'Total Quantity (Units)';
            updateUI();
        }

        function applyFilters() {
            const searchTerms = document.getElementById('searchTerm').value.toLowerCase().split(',').map(t => t.trim()).filter(t => t !== '');
            const category = document.getElementById('filterCategory').value;
            const branch = document.getElementById('filterBranch').value;
            const startVal = document.getElementById('startDate').value;
            const endVal = document.getElementById('endDate').value;
            const startDate = startVal ? new Date(startVal) : null;
            const endDate = endVal ? new Date(endVal) : null;
            if(endDate) endDate.setHours(23, 59, 59);

            activeData = allData.filter(row => {
                const descText = (row.Description || row.description || row.product || '').toLowerCase();
                const matchSearch = searchTerms.length === 0 || searchTerms.some(term => descText.includes(term));
                const matchCat = category === 'all' || row._category === category;
                const matchBranch = branch === 'all' || row._branch === branch;
                let matchDate = true;
                if (row._dateObj) {
                    if (startDate && row._dateObj < startDate) matchDate = false;
                    if (endDate && row._dateObj > endDate) matchDate = false;
                } else if (startDate || endDate) matchDate = false;
                return matchSearch && matchCat && matchBranch && matchDate;
            });
            updateUI();
        }

        function resetFilters() {
            document.getElementById('searchTerm').value = '';
            document.getElementById('filterCategory').value = 'all';
            document.getElementById('filterBranch').value = 'all';
            applyFilters();
        }

        function updateUI() {
            let metricSum = 0;
            const catStats = {};
            const compStats = {};
            const productStats = {};
            const monthlyStats = {};
            const branchUsageStats = {}; 

            activeData.forEach(row => {
                const valMetric = currentMetric === 'finance' ? row._total : row._qty;
                const valQty = row._qty;
                metricSum += valMetric;
                
                catStats[row._category] = (catStats[row._category] || 0) + valMetric;
                compStats[row._branch] = (compStats[row._branch] || 0) + valMetric;
                
                branchUsageStats[row._branch] = (branchUsageStats[row._branch] || 0) + valMetric;

                const p = row.Description || row.description || row.product || 'Unknown';
                productStats[p] = (productStats[p] || 0) + valMetric;
                
                if (row._dateObj) {
                    const monthKey = row._dateObj.getFullYear() + '-' + String(row._dateObj.getMonth() + 1).padStart(2, '0');
                    monthlyStats[monthKey] = (monthlyStats[monthKey] || 0) + valQty;
                }
            });

            document.getElementById('statTotalItems').innerText = activeData.length.toLocaleString();
            document.getElementById('statMainMetricValue').innerText = metricSum.toLocaleString(undefined, {minimumFractionDigits: currentMetric === 'finance' ? 2 : 0});
            document.getElementById('statUniqueProducts').innerText = Object.keys(productStats).length;
            document.getElementById('statTotalSuppliers').innerText = Object.keys(compStats).length;

            renderPie('categoryPieChart', 'catPie', catStats, ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4', '#475569']);
            renderPie('companyPieChart', 'compPie', compStats, ['#0ea5e9', '#f43f5e', '#10b981', '#fbbf24', '#a855f7', '#64748b', '#ec4899']);
            renderTop10Bar(productStats);
            renderTrendChart(monthlyStats);
            
            renderBranchUsageChart(branchUsageStats);
            
            lucide.createIcons();
        }

        }

        function renderDeliveryChart(stats) {
            const ctx = document.getElementById('deliveryBarChart');
            if(deliveryCharts) deliveryCharts.destroy();
            const sortedMonths = Object.keys(stats).sort();
            deliveryCharts = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sortedMonths,
                    datasets: [{
                        label: 'Total Delivery Volume (Boxes)',
                        data: sortedMonths.map(m => stats[m]),
                        backgroundColor: '#10b981',
                        borderRadius: 8
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: true, labels: { color: '#94a3b8', font: { family: 'Sarabun' } } }
                    },
                    scales: {
                        x: { grid: { display: false }, ticks: { color: '#64748b', font: { family: 'Sarabun' } } },
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b', font: { family: 'Sarabun' } }, beginAtZero: true }
                    }
                }
            });
        }

        window.onload = () => lucide.createIcons();
    </script>
</body>
</html>
